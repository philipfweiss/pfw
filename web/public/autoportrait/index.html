<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>autoportrait playground</title>
    <script type="module" crossorigin src="/autoportrait/assets/index-C3-i_jo_.js"></script>
    <link rel="stylesheet" crossorigin href="/autoportrait/assets/index-CNUq1TM6.css">
  </head>
  <body>
    <main class="page">
      <header>
        <h1>autoportrait <span class="sub">playground</span></h1>
        <a class="gh" href="https://github.com/philipfweiss/autoportrait">GitHub &nearr;</a>
      </header>

      <div class="split">
        <section class="stage">
          <div class="canvas-wrap">
            <canvas id="canvas" width="1000" height="1000"></canvas>
            <div class="pins" id="pins"></div>
          </div>
          <p class="caption" id="caption">&nbsp;</p>

          <div class="timeline">
            <button
              id="pause"
              type="button"
              class="icon"
              title="pause / resume (space)"
              aria-label="pause or resume"
            >
              &#10074;&#10074;
            </button>
            <input
              type="range"
              id="scrub"
              min="0"
              max="1000"
              value="0"
              step="1"
              aria-label="scrub through the painting"
            />
            <span class="time" id="time">0.0s / 0.0s</span>
          </div>

          <div class="run-row">
            <button id="paint" type="button" class="primary" title="repaint (r)">
              paint again
            </button>
            <button id="finish" type="button">skip to end</button>
          </div>

          <div class="regions">
            <p
              class="regions-head"
              title="The clusters the segmentation found, numbered in paint order. The lit chip is being painted right now."
            >
              regions, in paint order
            </p>
            <div class="legend" id="legend"></div>
          </div>
        </section>

        <aside class="controls">
          <fieldset>
            <legend>picture</legend>
            <div class="samples" id="samples">
              <button
                data-sample="philip"
                type="button"
                title="the demo portrait, with figure mask"
              >
                <img data-src="philip.jpg" alt="" /><span>demo</span>
              </button>
              <button
                data-sample="vermeer"
                type="button"
                title="Vermeer, Girl with a Pearl Earring (public domain)"
              >
                <img data-src="stock/vermeer.jpg" alt="" /><span>Vermeer</span>
              </button>
              <button
                data-sample="vangogh"
                type="button"
                title="Van Gogh, Self-Portrait, 1887 (public domain)"
              >
                <img data-src="stock/vangogh.jpg" alt="" /><span>Van Gogh</span>
              </button>
              <button
                data-sample="homer"
                type="button"
                title="Winslow Homer, Breezing Up (public domain)"
              >
                <img data-src="stock/homer.jpg" alt="" /><span>Homer</span>
              </button>
            </div>
            <div class="row">
              <label
                class="file"
                title="Upload any image. Painterly input (watercolor, oils) looks best; a plain photo still works."
              >
                <input type="file" id="imageFile" accept="image/*" />
                <span>
                  <svg
                    width="13"
                    height="13"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                  </svg>
                  upload picture
                </span>
              </label>
              <label
                class="file"
                title="Optional: a mask with the subject in white on black, made with tools/make_mask.py. Lets the background paint behind a finished subject and enables the face label."
              >
                <input type="file" id="maskFile" accept="image/*" />
                <span>
                  <svg
                    width="13"
                    height="13"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                  </svg>
                  upload figure mask
                </span>
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>choreography</legend>
            <label
              >preset
              <select id="preset">
                <option value="portraitist">portraitist (subject first)</option>
                <option value="landscapist">landscapist (world first)</option>
                <option value="printmaker">printmaker (drawing, then light to dark)</option>
              </select>
            </label>
            <label class="check">
              <input type="checkbox" id="focusMode" />
              click the canvas to add focus points
              <button id="clearFocus" type="button" class="ghost">clear</button>
            </label>
          </fieldset>

          <fieldset>
            <legend>dials</legend>
            <label class="seed-row"
              >seed <input type="number" id="seed" value="42" />
              <button id="dice" type="button" class="ghost" title="roll a new seed (s)">
                &#127922;
              </button></label
            >
            <div class="dial-grid">
              <label
                >tempo
                <input type="range" id="tempo" min="0.25" max="3" step="0.05" value="1" /><output
                  id="tempoOut"
                  >1.0×</output
                ></label
              >
              <label
                >regions <input type="range" id="k" min="3" max="12" step="1" value="7" /><output
                  id="kOut"
                  >7</output
                ></label
              >
              <label
                >big brush
                <input type="range" id="big" min="40" max="220" step="5" value="110" /><output
                  id="bigOut"
                  >110</output
                ></label
              >
              <label
                >small brush
                <input type="range" id="small" min="20" max="120" step="5" value="55" /><output
                  id="smallOut"
                  >55</output
                ></label
              >
              <label
                >sketch
                <input type="range" id="sketch" min="0" max="30" step="1" value="13" /><output
                  id="sketchOut"
                  >13s</output
                ></label
              >
              <label
                >washes <input type="range" id="wash" min="5" max="90" step="1" value="30" /><output
                  id="washOut"
                  >30s</output
                ></label
              >
            </div>
            <label>paper <input type="color" id="paper" value="#fbf6ea" /></label>
          </fieldset>

          <fieldset>
            <legend>export</legend>
            <div class="row">
              <button id="gif" type="button" title="renders the timeline offscreen">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                GIF
              </button>
              <button id="video" type="button" title="records a live replay at real duration">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                video
              </button>
              <button
                id="html"
                type="button"
                title="a self-contained page that repaints this exact painting"
              >
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                HTML
              </button>
              <button id="share" type="button" title="copy a link that reproduces these dials">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                  <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                </svg>
                copy link
              </button>
            </div>
            <p class="hint">
              Everything runs in your browser. Uploaded pictures never leave your machine and
              nothing is stored.
            </p>
          </fieldset>
        </aside>
      </div>
    </main>
  </body>
</html>
