<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 226" fill="none">
  <!-- Minerva: the triangulated truss M, redrawn from Airbnb's project mark.
       Ink strokes on nothing; the card's paper shows through. -->
  <g stroke="#3b2f28" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- left leg: pointed cap, triangulated bays, pointed foot -->
    <path d="M50 50 L72 28 L94 50" />
    <path d="M50 50 L50 176" />
    <path d="M94 50 L94 176" />
    <path d="M50 92 L94 92" />
    <path d="M50 134 L94 134" />
    <path d="M94 50 L50 92 L94 134 L50 176" />
    <path d="M50 176 L72 198 L94 176" />
    <!-- right leg, mirrored -->
    <path d="M186 50 L208 28 L230 50" />
    <path d="M186 50 L186 176" />
    <path d="M230 50 L230 176" />
    <path d="M186 92 L230 92" />
    <path d="M186 134 L230 134" />
    <path d="M186 50 L230 92 L186 134 L230 176" />
    <path d="M186 176 L208 198 L230 176" />
    <!-- the valley: a triangulated band meeting at the center node -->
    <path d="M94 50 L140 110" />
    <path d="M94 92 L140 152" />
    <path d="M117 71 L117 122" />
    <path d="M117 122 L140 110" />
    <path d="M186 50 L140 110" />
    <path d="M186 92 L140 152" />
    <path d="M163 71 L163 122" />
    <path d="M163 122 L140 110" />
    <path d="M140 110 L140 152" />
  </g>
  <!-- the reflection: the valley continuing faintly below the waterline -->
  <g stroke="#3b2f28" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.18">
    <path d="M140 152 L94 176" />
    <path d="M140 152 L186 176" />
    <path d="M140 163 L106 181" />
    <path d="M140 163 L174 181" />
  </g>
</svg>
